{% extends "base.html" %}

{% block content %}

<h1>Search Results</h1>

<p>You searched for: {{ query }}</p>

{% for user in results %}

    <div class="users">

        <h3>{{ user.username }}</h3>
        <a href="{{ url_for('users.user_details', user_id=user.id) }}">
            {{ user.username }}
        </a>


    </div>

{% endfor %}

{% endblock %}
