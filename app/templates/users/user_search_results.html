{% extends "base.html" %}

{% block content %}

<h1>Search Results</h1>

<p>You searched for: {{ query }}</p>

{% for user in results %}

    <div class="users">

        <h3>{{ user.username }}</h3>
        <a href="{{ url_for('users.user_details', user_id=user.id) }}">
            {{ user.username }}
        </a>


        <div class="card text-white bg-dark">
            <div class="username">{{ user.username }}</div>
                <div class="user details">
                <!--this might not work, let me know if it doesn't-->
                    <a
            
                        href="{{ url_for(user_detail, user_id=user.id) }}"
                        class="btn btn-success btn-md me-2"
                    >
                        go to user
                    </a>
                </div>
            </div>
        </div>


    </div>

{% endfor %}

{% endblock %}
