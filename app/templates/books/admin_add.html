{% extends "base.html" %}

{% block title %}Add Book{% endblock %}

{% block content %}

<div class="container mt-4">
    <h1>Add a New Book</h1>
    <p class="text-muted">Admins can add new books here.</p>

    <form action="{{ url_for('books.admin_add_book') }}" method="POST">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" name="author" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Publisher</label>
            <input type="text" name="publisher" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" name="isbn" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Year Published</label>
            <input type="number" name="year_published" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" name="genre" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Length</label>
            <input type="text" name="length" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Summary</label>
            <textarea name="summary" class="form-control" rows="4"></textarea>
        </div>

        <button class="btn btn-primary">Add Book</button>
    </form>
</div>

{% endblock %}
