{% extends "base.html" %}

{% block content %}

<div class="text-center">

    <h1>Search Results</h1>

    <p>You searched for: {{ query }}</p>

</div>

{% for book in results %}


        
    </div>
    <div class="d-flex justify-content-center">
        <div class="card text-white bg-dark mb-3" >
            <div class="book title">{{ book.title }}</div>
                <div class="book image and details">
        
                {% if book.cover_id %}
                <img src="{{ url_for('static', filename='covers/' ~ book.cover_id ~ '.jpg') }}"
                                    alt="{{ book.title }} cover" class="img-fluid mb-3" >
                {% endif %}
            
                <a
                    href="{{ url_for('books.detail', book_id=book.id) }}"
                    class="btn btn-success btn-md me-2"
                >
                    go to book
                </a>
                </div>
            </div>
        </div>
    </div>

{% endfor %}

{% endblock %}
