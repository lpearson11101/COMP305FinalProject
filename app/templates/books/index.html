{% extends 'base.html' %}

{% block content %}
    <span class="title">
        <h1>{% block title %} Books {% endblock %}</h1>
    </span>
    <div class="books">
        <h2>Book Blueprint</h2>

        <div class="books">
            <div class="new-book">
                <form method="POST">
                    <p>
                        <textarea id="q-name"
                                name="name"
                                placeholder="Book"
                                cols="30" rows="3"></textarea>
                    </p>
                    <textarea id="q-info"
                            name="info"
                            placeholder="Info"
                            cols="30" rows="3"></textarea>
                    <p><input type="submit"></p>
                </form>
            </div>
            <div class="books-list">
                {% for book in books %}
                    <div class="books">
                        <h4>{{ book.name }}</h4>
                        <p>{{ book.info }}</p>
                        <hr>
                    </div>
                {% endfor %}
            </div>
        </div>

    </div>
{% endblock %}
