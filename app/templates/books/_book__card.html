<!-- this is the famous bootstrap 12 column structure we'll want to use if we want three books 
 displayed per row-->
<div class="container">
  <div class="row">
    <div class="col-4">
    </div>
    <div class="col-4">
    </div>
    <div class="col-4">
    </div>
  </div>
</div>

<!-- this is an element that can hopefully be used in search results and the book lists on the 
 user page -->
{% block content %}
<div class="card text-white bg-dark">
        <div class="book title">{{ book.title }}</div>
        <div class="book image and details">

          {% if book.cover_id %}
          <img src="{{ url_for('static', filename='covers/' ~ book.cover_id ~ '.jpg') }}" 
                            alt="{{ book.title }} cover" class="img-fluid mb-3" >
          {% endif %}
        
          <a
              href="{{ url_for('books.detail', book_id=book.id) }}"
              class="btn btn-success btn-md me-2"
          >
              go to book
          </a>
        </div>
        </div>
</div>
{% endblock %}
