<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        {% block title %}BetterReads{% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a
            class="navbar-brand"
            href="{{ url_for('main.index') }}"
        >
            BetterReads
        </a>

        <div class="navbar-nav ms-auto">

            {% if current_user.is_authenticated %}

                <a
                    class="nav-link"
                    href="{{ url_for('books.books') }}"
                >
                    Books
                </a>

                <a
                    class="nav-link"
                    href="{{ url_for('users.profile') }}"
                >
                    Profile
                </a>

                <a
                    class="nav-link"
                    href="{{ url_for('auth.logout') }}"
                >
                    Logout
                </a>

            {% else %}

                <a
                    class="nav-link"
                    href="{{ url_for('auth.login') }}"
                >
                    Login
                </a>

                <a
                    class="nav-link"
                    href="{{ url_for('auth.register') }}"
                >
                    Register
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4 ">

    {% block content %}{% endblock %}

</div>

    <footer class ="footer footer-expand-lg bg-dark text-light">

        <p> ©Team MELEE 2026 </p>

    </footer>

</body>
</html>
